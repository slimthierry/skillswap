version: "3.9"

services:
  skillswap_db:
    image: postgres:15-alpine
    container_name: skillswap_db
    environment:
      POSTGRES_USER: skillswap_user
      POSTGRES_PASSWORD: skillswap_pass
      POSTGRES_DB: skillswap
    ports:
      - "55432:5432"
    volumes:
      - skillswap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillswap_user -d skillswap"]
      interval: 5s
      timeout: 5s
      retries: 5

  skillswap_redis:
    image: redis:7-alpine
    container_name: skillswap_redis
    ports:
      - "56379:6379"
    volumes:
      - skillswap_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  skillswap_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillswap_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "58000:8000"
    env_file:
      - .env
    depends_on:
      skillswap_db:
        condition: service_healthy
      skillswap_redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  skillswap_celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillswap_celery_worker
    command: celery -A app.celery_app:celery worker --loglevel=info
    env_file:
      - .env
    depends_on:
      skillswap_db:
        condition: service_healthy
      skillswap_redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  skillswap_celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillswap_celery_beat
    command: celery -A app.celery_app:celery beat --loglevel=info
    env_file:
      - .env
    depends_on:
      skillswap_db:
        condition: service_healthy
      skillswap_redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  skillswap_adminer:
    image: adminer
    container_name: skillswap_adminer
    ports:
      - "58080:8080"
    depends_on:
      - skillswap_db

volumes:
  skillswap_pgdata:
  skillswap_redisdata:
